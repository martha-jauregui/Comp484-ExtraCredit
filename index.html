<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Math.js Graphing Engine</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <header>
            <h1>Graphing Engine</h1>
            <p>Powered by Math.js & HTML5 Canvas</p>
        </header>

        <div class="controls">
            <div class="input-group">
                <span class="prefix">y =</span>
                <input type="text" id="equationInput" value="x^2" placeholder="e.g., sin(x) * 2">
            </div>
            <button id="graphBtn">Plot Function</button>
        </div>

        <div class="canvas-wrapper">
            <canvas id="graphCanvas" width="600" height="400"></canvas>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
